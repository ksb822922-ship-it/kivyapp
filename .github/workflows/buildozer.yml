name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: kivy/buildozer:latest

    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: yes | buildozer android debug
    - uses: actions/upload-artifact@v4
      if: success()
      with:
        name: myapp
        path: ./bin/*.apk
